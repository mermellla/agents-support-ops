name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - id: version
        name: Verify release tag
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: mkdir -p release-evidence
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-evidence/agents-support-ops-${{ steps.version.outputs.version }}.spdx.json
      - name: Generate checksums
        run: |
          (cd dist && sha256sum *.whl *.tar.gz) > release-evidence/SHA256SUMS
          (cd release-evidence && sha256sum *.spdx.json) >> release-evidence/SHA256SUMS
      - id: build-attestation
        name: Attest distribution build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - id: sbom-attestation
        name: Attest distributions with the SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: release-evidence/agents-support-ops-${{ steps.version.outputs.version }}.spdx.json
      - name: Record attestation references
        run: |
          echo "GitHub build provenance: ${{ steps.build-attestation.outputs.attestation-url }}" > release-evidence/ATTESTATIONS.txt
          echo "GitHub SBOM attestation: ${{ steps.sbom-attestation.outputs.attestation-url }}" >> release-evidence/ATTESTATIONS.txt
          echo "PyPI publish attestations are generated by Trusted Publishing during upload." >> release-evidence/ATTESTATIONS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            release-evidence/
          if-no-files-found: error

  verify-release-artifacts:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: release-artifact
      - name: Clean-install and smoke-test immutable wheel and sdist
        shell: bash
        run: |
          mapfile -t WHEELS < <(find release-artifact/dist -maxdepth 1 -type f -name '*.whl')
          mapfile -t SDISTS < <(find release-artifact/dist -maxdepth 1 -type f -name '*.tar.gz')
          test "${#WHEELS[@]}" -eq 1
          test "${#SDISTS[@]}" -eq 1

          python -m venv /tmp/release-wheel
          /tmp/release-wheel/bin/python -m pip install --upgrade pip
          /tmp/release-wheel/bin/python -m pip install "${WHEELS[0]}"
          /tmp/release-wheel/bin/python -c \
            "from agents_support_ops import EscalationPackage, ReplayBundle, ReplayStore; import agents_support_ops; assert agents_support_ops.__version__ == '${{ needs.build.outputs.version }}'"

          python -m venv /tmp/release-sdist
          /tmp/release-sdist/bin/python -m pip install --upgrade pip
          /tmp/release-sdist/bin/python -m pip install "${SDISTS[0]}"
          /tmp/release-sdist/bin/python -c \
            "from agents_support_ops import EscalationPackage, ReplayBundle, ReplayStore; import agents_support_ops; assert agents_support_ops.__version__ == '${{ needs.build.outputs.version }}'"

  testpypi:
    needs: [build, verify-release-artifacts]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: .
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          attestations: true

  verify-testpypi:
    needs: [build, testpypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install published package
        run: |
          for attempt in 1 2 3 4 5; do
            python -m pip install --no-cache-dir --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "agents-support-ops==${{ needs.build.outputs.version }}" && break
            sleep 15
          done
          python -c "import agents_support_ops; assert agents_support_ops.__version__ == '${{ needs.build.outputs.version }}'"

  pypi:
    needs: [build, verify-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: .
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

  release-assets:
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: .
      - name: Attach release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}" dist/* release-evidence/*
          --repo "${GH_REPO}" --clobber
